<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Sucha Admin</title>
<style>
  :root {
    --cream: #F5F2EB;
    --teal: #2D7A6B;
    --text: #171717;
    --muted: #4E534A;
    --line: rgba(45,122,107,0.22);
    --white: #fff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--cream);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    line-height: 1.5;
  }
  main { max-width: 1120px; margin: 0 auto; padding: 2rem; }
  h1, h2 { color: var(--teal); font-weight: 600; margin: 0 0 0.8rem; }
  section {
    background: rgba(255,255,255,0.78);
    border: 1px solid var(--line);
    margin: 1rem 0;
    padding: 1rem;
  }
  .toolbar, .grid { display: grid; gap: 0.75rem; }
  .toolbar { grid-template-columns: minmax(0, 1fr) auto; }
  .password-field { position: relative; min-width: 0; }
  .password-field input { width: 100%; padding-right: 3rem; }
  .password-toggle {
    align-items: center;
    background: transparent;
    border: 0;
    color: var(--teal);
    display: inline-flex;
    height: 42px;
    justify-content: center;
    min-height: 0;
    padding: 0;
    position: absolute;
    right: 0.15rem;
    top: 50%;
    transform: translateY(-50%);
    width: 42px;
  }
  .password-toggle svg { height: 19px; width: 19px; }
  input, button {
    border: 1px solid var(--line);
    font: inherit;
    min-height: 42px;
    padding: 0.65rem 0.8rem;
  }
  button {
    background: var(--teal);
    color: white;
    cursor: pointer;
    font-weight: 600;
  }
  button.secondary { background: transparent; color: var(--teal); }
  table { border-collapse: collapse; width: 100%; }
  th, td { border-bottom: 1px solid var(--line); padding: 0.7rem; text-align: left; vertical-align: top; }
  th { color: var(--teal); font-size: 0.78rem; text-transform: uppercase; }
  code { overflow-wrap: anywhere; }
  .cards { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 0.75rem; }
  .card { border: 1px solid var(--line); background: var(--white); padding: 0.85rem; }
  .label { color: var(--muted); font-size: 0.8rem; }
  .value { color: var(--teal); font-size: 1.45rem; font-weight: 700; }
  .status { color: var(--muted); min-height: 1.5rem; }
  @media (max-width: 780px) {
    main { padding: 1rem; }
    .toolbar, .cards { grid-template-columns: 1fr; }
    table { display: block; overflow-x: auto; }
  }
</style>
</head>
<body>
<main>
  <h1>Sucha Admin</h1>
  <p class="status" id="status">Enter the admin token configured in the Worker.</p>

  <section>
    <h2>Access</h2>
    <div class="toolbar">
      <div class="password-field">
        <input id="token" type="password" placeholder="Admin token">
        <button class="password-toggle" id="token-toggle" type="button" aria-label="Show admin token" aria-pressed="false">
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
      </div>
      <button id="load" type="button">Load dashboard</button>
    </div>
  </section>

  <section>
    <h2>Coupons</h2>
    <table>
      <thead>
        <tr>
          <th>Coupon</th>
          <th>Status</th>
          <th>Used by</th>
          <th>Updated</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="coupons">
        <tr><td colspan="5">Load dashboard to view coupons.</td></tr>
      </tbody>
    </table>
  </section>

  <section>
    <h2>Usage Analytics</h2>
    <div class="cards" id="totals"></div>
    <div class="grid" id="analytics"></div>
  </section>
</main>

<script src="/admin.js?v=password-eye-fix-1" defer></script>
</body>
</html>
